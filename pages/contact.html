<head>
    <meta charset="UTF-8">

</head>
<body class="bacgkground-image">
    <script src="../js/nav.js"></script>

    <main class="overlay">
        <div class="container"><h1>Me Contacter</h1></div>
        <div class="container laPage">

            <div class="contact-grid">

                <!-- Infos -->
                <div class="slide-gauche">
                    <h2 class="titre-section">Coordonnées</h2>

                    <div class="contact-info-item">
                        <div class="contact-info-icon">📍</div>
                        <div class="contact-info-text">
                            <strong>Nantes</strong>
                            <span>France</span>
                        </div>
                    </div>
                    <div class="contact-info-item">
                        <div class="contact-info-icon">✉️</div>
                        <div class="contact-info-text">
                            <strong>remi.fm.pro@gmail.com</strong>
                            <span>Email professionnel</span>
                        </div>
                    </div>
                    <!-- <div class="contact-info-item">
                        <div class="contact-info-icon">📞</div>
                        <div class="contact-info-text">
                            <strong>06 06 06 06 06</strong>
                            <span>Téléphone</span>
                        </div>
                    </div> -->
                    <div class="contact-info-item">
                        <div class="contact-info-icon">🔗</div>
                        <div class="contact-info-text">
                            <strong><a href="https://www.linkedin.com/in/remi-fillon/" target="_blank" style="color:#6e00b8;">LinkedIn</a></strong>
                            <span>Profil professionnel</span>
                        </div>
                    </div>
                    <!-- <div class="contact-info-item">
                        <div class="contact-info-icon">🐙</div>
                        <div class="contact-info-text">
                            <strong><a href="https://github.com/" target="_blank" style="color:#6e00b8;">GitHub</a></strong>

                        </div>
                    </div> -->

                    <!-- <div style="margin-top:28px;">
                        <a href="../pdf/cv.pdf" download class="boutonT1-2" style="display:inline-block; background:linear-gradient(to bottom,#6e00b8,#bd39ff); color:#fff; padding:11px 24px; border-radius:8px; text-decoration:none; font-weight:700;">⬇ Télécharger mon CV</a>
                    </div> -->
                </div>

                <!-- Formulaire -->
                <div class="slide-droite">
                    <h2 class="titre-section">Envoyer un message</h2>

                    <p style="color:#888; font-style:italic; margin-bottom:16px;">
                        ⚠️ Le formulaire est désactivé — contactez-moi directement par email.
                    </p>

                    <div class="alert-success-contact" id="alertSuccessContact">
                        ✔ Votre message a bien été transmis !
                    </div>

                    <form id="contactForm" novalidate class="contact-form">
                        <div class="form-group">
                            <label for="nom">Votre nom *</label>
                            <input type="text" id="nom" name="nom" placeholder="Prénom NOM" autocomplete="name" disabled>
                            <div class="form-error" id="nom-err"></div>
                        </div>
                        <div class="form-group">
                            <label for="email">Adresse email *</label>
                            <input type="email" id="email" name="email" placeholder="exemple@email.fr" autocomplete="email" disabled>
                            <div class="form-error" id="email-err"></div>
                        </div>
                        <div class="form-group">
                            <label for="sujet">Sujet *</label>
                            <select id="sujet" name="sujet" disabled>
                                <option value="" disabled selected>Choisissez un sujet</option>
                                <option value="Proposition de stage">Proposition de stage</option>
                                <option value="Proposition d'alternance">Proposition d'alternance</option>
                                <option value="Collaboration / projet">Collaboration / projet</option>
                                <option value="Question">Question</option>
                                <option value="Autre">Autre</option>
                            </select>
                            <div class="form-error" id="sujet-err"></div>
                        </div>
                        <div class="form-group">
                            <label for="message">Message *</label>
                            <textarea id="message" name="message" placeholder="Votre message…" disabled></textarea>
                            <div class="form-error" id="message-err"></div>
                        </div>
                        <button type="submit" class="boutonT1" style="width:100%; background:#6e00b8; color:#fff; border:none; padding:12px; border-radius:8px; font-family:'Anta',sans-serif; font-size:1rem; cursor:pointer;" disabled>
                            ✉️ Envoyer le message
                        </button>
                    </form>
                </div>

            </div>

        </div>
    </main>

    <a class="retourAccueil boutonT3" href="../index.html"><img src="../images/accueil.png" alt="Accueil"></a>
    <script src="../js/script.js"></script>
</body>
</html>
